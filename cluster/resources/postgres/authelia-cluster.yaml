apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: authelia-db
  namespace: core-auth
spec:
  instances: 1

  imageName: ghcr.io/cloudnative-pg/postgresql:16.4

  bootstrap:
    initdb:
      database: authelia
      owner: authelia

  storage:
    storageClass: longhorn
    size: 2Gi

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

  monitoring:
    enablePodMonitor: true

  postgresql:
    parameters:
      shared_buffers: 64MB
      effective_cache_size: 128MB
      work_mem: 4MB
      maintenance_work_mem: 32MB

  enablePDB: false
