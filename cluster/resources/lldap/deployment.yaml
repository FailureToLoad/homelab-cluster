apiVersion: apps/v1
kind: Deployment
metadata:
  name: lldap
  namespace: core-auth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lldap
  template:
    metadata:
      labels:
        app: lldap
    spec:
      containers:
        - name: lldap
          image: lldap/lldap:v0.6.2
          ports:
            - name: ldap
              containerPort: 3890
            - name: http
              containerPort: 17170
          env:
            - name: UID
              value: "1000"
            - name: GID
              value: "1000"
            - name: TZ
              value: "America/Chicago"
            - name: LLDAP_LDAP_BASE_DN
              value: "dc=homelab,dc=local"
            - name: LLDAP_HTTP_URL
              value: "https://lldap.zonkey-broadnose.ts.net"
          envFrom:
            - secretRef:
                name: lldap-secrets
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 64Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: lldap-data
---
apiVersion: v1
kind: Service
metadata:
  name: lldap
  namespace: core-auth
spec:
  selector:
    app: lldap
  ports:
    - name: ldap
      port: 389
      targetPort: 3890
    - name: http
      port: 80
      targetPort: 17170
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: lldap-data
  namespace: core-auth
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 1Gi
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lldap
  namespace: core-auth
spec:
  ingressClassName: tailscale
  rules:
    - host: lldap
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: lldap
                port:
                  name: http
  tls:
    - hosts:
        - lldap
